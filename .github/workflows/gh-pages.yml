name: Deploy Serenity Report to GitHub Pages

on:
  push:
    branches: ["gh-pages"]   # Se dispara cuando publish-report.sh hace push a gh-pages
  workflow_dispatch:          # También disparable manualmente desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del branch gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages     # Siempre leer desde el branch gh-pages, no main

      - name: Verificar que el reporte existe
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html no encontrado en el branch gh-pages."
            echo "Ejecuta ./publish-report.sh localmente para generar y publicar el reporte."
            exit 1
          fi
          echo "✅ Reporte Serenity listo: $(find . -type f | wc -l) archivos"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
