name: Living Documentation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: maven

    - name: Run tests and generate Serenity report
      # mvn verify: runs Surefire (tests) + serenity:aggregate (HTML report)
      # -Denvironment=with_screenshots activates screenshots on every step
      run: mvn -B verify --file pom.xml -Denvironment=with_screenshots

    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@4.1.1
      with:
        branch: gh-pages
        folder: target/site/serenity
