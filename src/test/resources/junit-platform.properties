# =============================================================================
# JUnit Platform – Serenity BDD – Ticketing MVP
# MODO: SECUENCIAL – 1 escenario a la vez, 1 navegador a la vez
# =============================================================================

# Paralelismo DESACTIVADO intencionalmente para máxima estabilidad.
# Para activarlo en el futuro cuando la suite esté madura:
#   cucumber.execution.parallel.enabled=true
#   cucumber.execution.parallel.config.strategy=fixed
#   cucumber.execution.parallel.config.fixed.parallelism=4
#   cucumber.execution.parallel.config.fixed.max-pool-size=4
cucumber.execution.parallel.enabled=false

# Filtrar por tag desde CLI:  -Dcucumber.filter.tags="@smoke"
# Ejemplo:  mvn clean verify -Dcucumber.filter.tags="@guest-happy-path"

# Excluye escenarios @wip del build estándar.
# Son escenarios documentados pero bloqueados por dependencia de datos/DOM.
# Para ejecutarlos cuando los datos estén listos:
#   mvn clean test -Dcucumber.filter.tags="@wip" -Dwebdriver.base.url=http://localhost:5173
cucumber.filter.tags=not @wip
