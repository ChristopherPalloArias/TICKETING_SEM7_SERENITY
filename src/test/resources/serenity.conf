# =============================================================================
# Serenity BDD – Ticketing MVP – Automatización Funcional UI
# =============================================================================

serenity {
  project.name = "Ticketing MVP – Guest Happy Path"
  take.screenshots = FOR_FAILURES
  restart.browser.for.each = feature
}

headless.mode = false   # Cambiar a true para CI/CD

webdriver {
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "--window-size=1280,900",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "disable-extensions",
        "disable-web-security",
        "disable-translate",
        "disable-logging"
      ]
    }
  }
}

# =============================================================================
# Entornos parametrizables
# Uso: mvn clean test -Denvironment=staging
# Sin -Denvironment: se usa "default" → http://localhost:5173
# =============================================================================
environments {
  default {
    webdriver.base.url = "http://localhost:5173"
  }
  dev {
    webdriver.base.url = "http://localhost:5173"
  }
  with_screenshots {
    # Igual al default pero con capturas en cada paso (usado en CI para Living Docs)
    webdriver.base.url = "http://localhost:5173"
  }
  staging {
    webdriver.base.url = "https://staging.ticketing.example.com"
  }
  prod {
    webdriver.base.url = "https://ticketing.example.com"
  }
}
